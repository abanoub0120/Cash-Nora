<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتهى العرض</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a; /* خلفية داكنة احترافية */
            color: white;
            font-family: 'Tajawal', sans-serif;
        }

        .main-card {
            text-align: center;
            padding: 20px;
        }

        /* الدائرة المركزية */
        .status-circle {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #1e293b, #0f172a);
            border: 6px solid #f43f5e; /* لون أحمر للدلالة على الانتهاء */
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 40px rgba(244, 63, 94, 0.3);
            animation: pulse 2s infinite;
        }

        .status-circle h2 {
            margin: 0;
            font-size: 28px;
            color: #f43f5e;
        }

        /* زر قناة التليجرام */
        .tg-link {
            display: inline-block;
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4);
        }

        .tg-link:hover {
            transform: scale(1.05);
            background: #0099e6;
        }

        /* حركة نبض خفيفة للدائرة */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(244, 63, 94, 0.3); }
            50% { transform: scale(1.02); box-shadow: 0 0 50px rgba(244, 63, 94, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(244, 63, 94, 0.3); }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- الدائرة وبداخلها النص -->
        <div class="status-circle">
            <h2>تم انتهاء</h2>
            <h2 style="font-size: 40px;">العرض</h2>
            <p style="margin-top: 10px; font-size: 14px; color: #cbd5e1;">الرابط غير متاح الآن</p>
        </div>

        <!-- رابط القناة بالأسفل -->
        <p style="margin-bottom: 20px; font-size: 18px; color: #94a3b8;">لمتابعة العروض الجديدة:</p>
        <a href="https://t.me/+q09P_4XEXUQwZWY0" class="tg-link">رابط القناة الرسمي 🔗</a>
    </div>

</body>
</html>
